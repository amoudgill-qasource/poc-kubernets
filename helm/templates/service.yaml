apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: sample-app
    env: {{ .Values.env }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      nodePort: 30080
