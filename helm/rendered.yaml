apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
      env: dev
  template:
    metadata:
      labels:
        app: sample-app
        env: dev
    spec:
      serviceAccountName: dev-ci

      initContainers:
      - name: wait-for-db
        image: busybox
        command:
          - sh
          - -c
          - |
            until nc -z db 3306; do
              echo "Waiting for MySQL..."
              sleep 2
            done

      containers:
      - name: sample-app
        image: "sample-app:latest"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000

        envFrom:
        - configMapRef:
            name: sample-app-config
        - secretRef:
            name: sample-app-secret

        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
