services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=ecommerce.settings
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=mysql://${DB_USER:-django_user}:${DB_PASSWORD:-django_password}@db:3306/${DB_NAME:-ecommerce_project}
    depends_on:
      - db
    networks:
      - ecommerce-network

  db:
    image: mysql:8.0
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce_project}
      MYSQL_USER: ${MYSQL_USER:-django_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-django_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecommerce-network

volumes:
  mysql_data:

networks:
  ecommerce-network:
    driver: bridge
